name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  # ── Deploy preview (on open / push) ────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    environment:
      name: pr-preview
      url: https://el-j.github.io/mark-your-picture/preview/pr-${{ github.event.number }}/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with PR-scoped base path
        run: npm run build
        env:
          VITE_BASE: /mark-your-picture/preview/pr-${{ github.event.number }}/

      - name: Deploy to gh-pages preview sub-path
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: preview/pr-${{ github.event.number }}
          keep_files: true

      - name: Post / update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://el-j.github.io/mark-your-picture/preview/pr-${{ github.event.number }}/`;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              '## 🔍 PR Preview',
              '',
              `**Live preview:** [${url}](${url})`,
              '',
              `Deployed from commit \`${sha}\`. Updated automatically on every push.`,
              '',
              '_Preview is removed automatically when the PR is closed._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 🔍 PR Preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Remove preview on PR close ─────────────────────────────────────────────
  cleanup-preview:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Remove PR preview directory
        run: |
          PR_DIR="preview/pr-${{ github.event.number }}"
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "chore: remove preview for PR #${{ github.event.number }}"
            git push
          else
            echo "No preview directory found for PR #${{ github.event.number }}, nothing to clean up."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post cleanup comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## 🔍 PR Preview',
              '',
              '_Preview has been removed as this PR is now closed._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 🔍 PR Preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
