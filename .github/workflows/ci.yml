name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npm run check

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Post coverage summary comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'coverage/coverage-summary.json';
            if (!fs.existsSync(summaryPath)) {
              console.log('No coverage summary found, skipping comment');
              return;
            }
            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            const t = summary.total;
            const pct = (v) => `${v.pct.toFixed(1)}%`;
            const icon = (v) => v.pct >= 80 ? '🟢' : v.pct >= 50 ? '🟡' : '🔴';
            const body = [
              '## 📊 Coverage Report',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| ${icon(t.statements)} Statements | ${pct(t.statements)} (${t.statements.covered}/${t.statements.total}) |`,
              `| ${icon(t.branches)} Branches | ${pct(t.branches)} (${t.branches.covered}/${t.branches.total}) |`,
              `| ${icon(t.functions)} Functions | ${pct(t.functions)} (${t.functions.covered}/${t.functions.total}) |`,
              `| ${icon(t.lines)} Lines | ${pct(t.lines)} (${t.lines.covered}/${t.lines.total}) |`,
              '',
              `> Full HTML report available as a [workflow artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 📊 Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Deploy Playwright report to GitHub Pages
        if: failure()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: e2e-reports/pr-${{ github.event.number }}
          keep_files: true

      - name: Post E2E result comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const reportUrl = `https://el-j.github.io/mark-your-picture/e2e-reports/pr-${{ github.event.number }}/`;
            const body = [
              '## ❌ E2E Tests Failed',
              '',
              'One or more end-to-end tests failed. If you intentionally changed the UI:',
              '',
              `📸 **[View screenshot diffs in the Playwright report](${reportUrl})**`,
              '',
              'To auto-update the baseline screenshots, comment on this PR:',
              '',
              '```',
              '/update-snapshots',
              '```',
              '',
              'Or update locally:',
              '',
              '```bash',
              'npm run build && npm run e2e:update',
              'git add e2e/visual.spec.ts-snapshots',
              'git commit -m "test(e2e): update visual snapshots"',
              '```',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## ❌ E2E Tests Failed'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

