<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Client-Side Watermark Tool</title>
    <!-- JSZip für das Herunterladen mehrerer Dateien als ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FileSaver.js zum Speichern der ZIP-Datei -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --primary: #0032A0;
            --primary-hover: #002370;
            --secondary: #e1e8ed;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-radius: 16px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Geändert für besseres Scrollen */
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 15px 35px rgba(0, 50, 160, 0.1);
            width: 100%;
            max-width: 1100px; /* Breiter für das 2-Spalten Layout */
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .sidebar {
            border-right: 2px solid var(--secondary);
            padding-right: 30px;
        }

        @media (max-width: 900px) {
            .sidebar {
                border-right: none;
                border-bottom: 2px solid var(--secondary);
                padding-right: 0;
                padding-bottom: 30px;
            }
        }

        .main-content {
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 1px;
            grid-column: 1 / -1;
            text-align: center;
            border-bottom: 1px solid var(--secondary);
            padding-bottom: 20px;
        }

        h2 {
            font-size: 1.2rem;
            color: #555;
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* Segmented Control (Toggle) */
        .type-toggle {
            display: flex;
            background-color: var(--secondary);
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 25px;
            position: relative;
        }

        .type-toggle input[type="radio"] {
            display: none;
        }

        .type-toggle label {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            transition: var(--transition);
            margin: 0;
            z-index: 1;
        }

        .type-toggle input[type="radio"]:checked + label {
            color: white;
        }

        .toggle-bg {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 50%;
            background-color: var(--primary);
            border-radius: 30px;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 0;
        }

        #typeImage:checked ~ .toggle-bg {
            transform: translateX(100%);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .control-label {
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], select {
            padding: 10px 15px;
            border: 2px solid var(--secondary);
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
            background-color: #fafbfc;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0, 50, 160, 0.1);
        }

        input[type="range"] {
            width: 100%;
            margin-top: 10px;
            accent-color: var(--primary);
        }

        input[type="file"] { display: none; }

        .file-upload-btn {
            background-color: #f8f9fa;
            color: var(--primary);
            border: 2px dashed #b3c3d3;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-sizing: border-box;
        }

        .file-upload-btn svg { width: 20px; height: 20px; }

        .file-upload-btn:hover {
            border-color: var(--primary);
            background-color: #f0f4f8;
        }

        .file-upload-btn.active {
            border-style: solid;
            background-color: #e6f0fa;
            border-color: var(--primary);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 50, 160, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 50, 160, 0.3);
        }

        .btn:disabled {
            background-color: #b3c3d3;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Tabs System */
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--secondary);
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: var(--transition);
        }

        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Canvas & Preview */
        .canvas-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            min-height: 300px;
            border: 2px solid var(--secondary);
            position: relative;
            background-image: linear-gradient(45deg, #e1e8ed 25%, transparent 25%), linear-gradient(-45deg, #e1e8ed 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e1e8ed 75%), linear-gradient(-45deg, transparent 75%, #e1e8ed 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            margin-bottom: 20px;
        }

        .canvas-placeholder {
            color: #6c7a89;
            position: absolute;
            text-align: center;
            pointer-events: none;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        canvas {
            max-width: 100%;
            max-height: 50vh;
            height: auto;
            display: block;
            object-fit: contain;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Batch List */
        .batch-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--secondary);
            border-radius: 8px;
            background: #fff;
        }

        .batch-item {
            padding: 10px 15px;
            border-bottom: 1px solid var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        .batch-item:last-child { border-bottom: none; }
        .batch-item .status { font-weight: bold; color: #2ecc71; }
        .batch-item .status.pending { color: #f39c12; }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 10px;
            background-color: var(--secondary);
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background-color: #2ecc71;
            width: 0%;
            transition: width 0.3s;
        }

        /* Dynamisches Ein-/Ausblenden */
        .mode-text, .mode-image { display: none; }
        body[data-mode="text"] .mode-text { display: flex; }
        body[data-mode="image"] .mode-image { display: flex; }
    </style>
</head>
<body data-mode="text">

<div class="container">
    <h1>Wasserzeichen Studio Pro</h1>
    
    <!-- Sidebar: Wasserzeichen Einstellungen -->
    <div class="sidebar">
        <h2>Einstellungen</h2>
        
        <div class="type-toggle">
            <input type="radio" name="wmType" id="typeText" value="text" checked>
            <label for="typeText">Text</label>
            
            <input type="radio" name="wmType" id="typeImage" value="image">
            <label for="typeImage">Logo (PNG)</label>
            
            <div class="toggle-bg"></div>
        </div>

        <div class="control-group mode-text">
            <label class="control-label" for="watermarkText">Wasserzeichen Text</label>
            <input type="text" id="watermarkText" value="© Mein Copyright">
        </div>

        <div class="control-group mode-image">
            <label class="control-label">Wasserzeichen Logo</label>
            <label class="file-upload-btn" for="wmImageLoader" id="wmImageBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span>Logo auswählen...</span>
            </label>
            <input type="file" id="wmImageLoader" accept="image/png, image/jpeg, image/webp, image/svg+xml"/>
        </div>

        <div class="control-group">
            <label class="control-label" for="position">Position</label>
            <select id="position">
                <option value="bottom-right">Unten Rechts</option>
                <option value="bottom-left">Unten Links</option>
                <option value="top-right">Oben Rechts</option>
                <option value="top-left">Oben Links</option>
                <option value="center">Mitte</option>
            </select>
        </div>

        <div class="control-group">
            <label class="control-label" for="sizeSlider">Größe anpassen</label>
            <input type="range" id="sizeSlider" min="5" max="50" value="15">
        </div>
        
        <p style="font-size: 0.8rem; color: #777; margin-top: 20px;">
            ℹ️ Änderungen hier werden sofort in der Vorschau rechts sichtbar und gelten auch für die Stapelverarbeitung.
        </p>
    </div>

    <!-- Main Content: Tabs -->
    <div class="main-content">
        <div class="tabs">
            <button class="tab-btn active" data-target="tab-single">Einzelbild</button>
            <button class="tab-btn" data-target="tab-batch">Stapelverarbeitung</button>
        </div>

        <!-- TAB: EINZELBILD -->
        <div id="tab-single" class="tab-content active">
            <div class="control-group">
                <label class="file-upload-btn" for="singleImageLoader" id="singleImageBtn" style="padding: 20px; font-size: 1.1rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span>Foto hochladen & Vorschau sehen</span>
                </label>
                <input type="file" id="singleImageLoader" accept="image/png, image/jpeg, image/webp"/>
            </div>

            <div class="canvas-container" id="canvasWrapper">
                <div class="canvas-placeholder" id="placeholderText">Lade ein Bild hoch für die Vorschau</div>
                <canvas id="imageCanvas"></canvas>
            </div>

            <button id="downloadSingleBtn" class="btn" disabled>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Bild herunterladen
            </button>
        </div>

        <!-- TAB: STAPELVERARBEITUNG -->
        <div id="tab-batch" class="tab-content">
            <div class="control-group">
                <label class="file-upload-btn" for="batchImageLoader" id="batchImageBtn" style="padding: 20px; font-size: 1.1rem; background-color: #e8f4fd;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                    <span>Mehrere Fotos auswählen (Stapel)</span>
                </label>
                <!-- Wichtig: multiple Attribut! -->
                <input type="file" id="batchImageLoader" accept="image/png, image/jpeg, image/webp" multiple/>
            </div>

            <div class="batch-list" id="batchList">
                <!-- Hier erscheinen die ausgewählten Dateien -->
                <div style="padding: 15px; text-align: center; color: #888;">Noch keine Bilder ausgewählt.</div>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <button id="downloadBatchBtn" class="btn" style="margin-top: 20px;" disabled>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Alle Bilder als ZIP herunterladen
            </button>
            <p id="batchStatusMsg" style="text-align: center; color: #555; font-size: 0.9rem; display: none;"></p>
        </div>
    </div>
</div>

<script>
    // --- UI State & Elemente ---
    const wmTypeRadios = document.getElementsByName('wmType');
    const wmImageLoader = document.getElementById('wmImageLoader');
    const wmImageBtn = document.getElementById('wmImageBtn');
    
    // Einstellungen
    const watermarkTextInput = document.getElementById('watermarkText');
    const positionSelect = document.getElementById('position');
    const sizeSlider = document.getElementById('sizeSlider');
    
    // Einzelbild Tab
    const singleImageLoader = document.getElementById('singleImageLoader');
    const singleImageBtn = document.getElementById('singleImageBtn');
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d');
    const placeholderText = document.getElementById('placeholderText');
    const downloadSingleBtn = document.getElementById('downloadSingleBtn');
    
    // Batch Tab
    const batchImageLoader = document.getElementById('batchImageLoader');
    const batchImageBtn = document.getElementById('batchImageBtn');
    const batchList = document.getElementById('batchList');
    const downloadBatchBtn = document.getElementById('downloadBatchBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const batchStatusMsg = document.getElementById('batchStatusMsg');

    // Globale Variablen
    let currentMode = 'text';
    let watermarkImage = null;
    let singleImageFile = null;
    let singleImageObj = null;
    let batchFiles = [];

    // --- Tab Switching Logic ---
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            tabContents.forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.target).classList.add('active');
        });
    });

    // --- Einstellungen Events ---
    wmTypeRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
            currentMode = e.target.value;
            document.body.setAttribute('data-mode', currentMode);
            updateSinglePreview();
        });
    });

    [watermarkTextInput, positionSelect, sizeSlider].forEach(el => {
        el.addEventListener('input', updateSinglePreview);
    });

    // Wasserzeichen-Logo laden
    wmImageLoader.addEventListener('change', (e) => {
        if (!e.target.files || !e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                watermarkImage = img;
                wmImageBtn.classList.add('active');
                wmImageBtn.querySelector('span').innerText = '✓ Logo geladen';
                updateSinglePreview();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // --- Tab 1: Einzelbild Logic ---
    singleImageLoader.addEventListener('change', (e) => {
        if (!e.target.files || !e.target.files[0]) return;
        singleImageFile = e.target.files[0];
        const reader = new FileReader();
        
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                singleImageObj = img;
                placeholderText.style.display = 'none';
                singleImageBtn.classList.add('active');
                singleImageBtn.querySelector('span').innerText = '✓ ' + singleImageFile.name;
                updateSinglePreview();
                downloadSingleBtn.disabled = false;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(singleImageFile);
    });

    function updateSinglePreview() {
        if (!singleImageObj) return;
        drawWatermarkOnCanvas(canvas, ctx, singleImageObj);
    }

    downloadSingleBtn.addEventListener('click', () => {
        if (!singleImageObj) return;
        const dataURL = canvas.toDataURL('image/jpeg', 0.95);
        const link = document.createElement('a');
        const originalName = singleImageFile.name.split('.')[0];
        link.download = `${originalName}_watermarked.jpg`;
        link.href = dataURL;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    // --- Core Render Funktion (für Vorschau und Batch) ---
    function drawWatermarkOnCanvas(targetCanvas, targetCtx, baseImage) {
        targetCanvas.width = baseImage.width;
        targetCanvas.height = baseImage.height;
        targetCtx.drawImage(baseImage, 0, 0);

        const padding = targetCanvas.width * 0.04;
        const scalePercent = sizeSlider.value / 100;
        let wmWidth, wmHeight, x, y;

        if (currentMode === 'text') {
            const text = watermarkTextInput.value;
            if (!text) return;

            const fontSize = Math.max(20, targetCanvas.width * scalePercent * 0.5); 
            targetCtx.font = `bold ${fontSize}px 'Segoe UI', Roboto, Arial`;
            targetCtx.fillStyle = "rgba(255, 255, 255, 0.85)";
            
            targetCtx.shadowColor = "rgba(0, 0, 0, 0.75)";
            targetCtx.shadowBlur = Math.max(5, fontSize * 0.2);
            targetCtx.shadowOffsetX = Math.max(2, fontSize * 0.1);
            targetCtx.shadowOffsetY = Math.max(2, fontSize * 0.1);

            const metrics = targetCtx.measureText(text);
            wmWidth = metrics.width;
            wmHeight = fontSize; 
            
            calculatePosition(targetCanvas, wmWidth, wmHeight, padding, (px, py) => {
                targetCtx.fillText(text, px, py + wmHeight * 0.8);
            });

        } else if (currentMode === 'image') {
            if (!watermarkImage) return;

            targetCtx.shadowColor = "transparent";
            targetCtx.globalAlpha = 0.9;

            wmWidth = targetCanvas.width * scalePercent;
            const aspectRatio = watermarkImage.height / watermarkImage.width;
            wmHeight = wmWidth * aspectRatio;

            calculatePosition(targetCanvas, wmWidth, wmHeight, padding, (px, py) => {
                targetCtx.drawImage(watermarkImage, px, py, wmWidth, wmHeight);
            });
            targetCtx.globalAlpha = 1.0;
        }

        function calculatePosition(cnv, w, h, p, callback) {
            let px, py;
            switch (positionSelect.value) {
                case 'bottom-right': px = cnv.width - w - p; py = cnv.height - h - p; break;
                case 'bottom-left': px = p; py = cnv.height - h - p; break;
                case 'top-right': px = cnv.width - w - p; py = p; break;
                case 'top-left': px = p; py = p; break;
                case 'center': px = (cnv.width - w) / 2; py = (cnv.height - h) / 2; break;
            }
            callback(px, py);
        }
    }


    // --- Tab 2: Batch Processing Logic ---
    batchImageLoader.addEventListener('change', (e) => {
        if (!e.target.files || e.target.files.length === 0) return;
        
        // Files in Array umwandeln
        batchFiles = Array.from(e.target.files);
        
        batchImageBtn.classList.add('active');
        batchImageBtn.querySelector('span').innerText = `${batchFiles.length} Bilder ausgewählt`;
        downloadBatchBtn.disabled = false;

        // Liste aktualisieren
        batchList.innerHTML = '';
        batchFiles.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'batch-item';
            item.innerHTML = `
                <span>📄 ${file.name}</span>
                <span class="status pending" id="status-${index}">Wartet...</span>
            `;
            batchList.appendChild(item);
        });
    });

    downloadBatchBtn.addEventListener('click', async () => {
        if (batchFiles.length === 0) return;
        if (currentMode === 'image' && !watermarkImage) {
            alert("Bitte lade zuerst ein Logo-Wasserzeichen hoch.");
            return;
        }

        // UI für Start vorbereiten
        downloadBatchBtn.disabled = true;
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        batchStatusMsg.style.display = 'block';
        batchStatusMsg.innerText = 'Erstelle ZIP-Datei... Bitte warten.';

        const zip = new JSZip();
        // Wir brauchen ein temporäres Canvas für die Verarbeitung im Hintergrund
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');

        for (let i = 0; i < batchFiles.length; i++) {
            const file = batchFiles[i];
            const statusEl = document.getElementById(`status-${i}`);
            statusEl.innerText = 'Verarbeite...';
            statusEl.style.color = '#3498db'; // Blau

            try {
                // 1. Bild laden (asynchron)
                const img = await loadImageAsync(file);
                
                // 2. Wasserzeichen zeichnen
                drawWatermarkOnCanvas(tempCanvas, tempCtx, img);
                
                // 3. Canvas zu Blob konvertieren (für ZIP)
                const blob = await new Promise(resolve => tempCanvas.toBlob(resolve, 'image/jpeg', 0.95));
                
                // 4. Zum ZIP hinzufügen
                const newName = file.name.replace(/\.[^/.]+$/, "") + "_wm.jpg";
                zip.file(newName, blob);

                // UI Update
                statusEl.innerText = '✓ Fertig';
                statusEl.style.color = '#2ecc71'; // Grün
                statusEl.classList.remove('pending');
                progressBar.style.width = `${((i + 1) / batchFiles.length) * 100}%`;

            } catch (error) {
                console.error("Fehler bei Datei:", file.name, error);
                statusEl.innerText = '✗ Fehler';
                statusEl.style.color = '#e74c3c'; // Rot
            }
        }

        // ZIP generieren und herunterladen
        batchStatusMsg.innerText = 'Speichere ZIP-Datei auf deinem PC...';
        
        zip.generateAsync({type:"blob"}).then(function(content) {
            saveAs(content, "Wasserzeichen_Bilder.zip");
            
            // UI Reset
            batchStatusMsg.innerText = '✅ Erfolgreich heruntergeladen!';
            downloadBatchBtn.disabled = false;
            setTimeout(() => {
                progressContainer.style.display = 'none';
                progressBar.style.width = '0%';
            }, 3000);
        });
    });

    // Hilfsfunktion: File-Reader als Promise verpacken (für saubere async/await loops)
    function loadImageAsync(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = event.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

</script>
