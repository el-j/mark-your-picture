<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1d27"/>
  <!-- Image frame -->
  <rect x="64" y="80" width="384" height="288" rx="24" fill="#22263a" stroke="#2e3450" stroke-width="6"/>
  <!-- Sun / circle -->
  <circle cx="172" cy="176" r="44" fill="#6c63ff" opacity="0.9"/>
  <!-- Mountain path -->
  <path d="M80 340 L192 200 L272 284 L320 228 L432 340 Z" fill="#6c63ff" opacity="0.75"/>
  <!-- Watermark bar -->
  <rect x="64" y="400" width="384" height="48" rx="10" fill="#6c63ff" opacity="0.15"/>
  <!-- © symbol -->
  <text x="128" y="432" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#6c63ff" opacity="0.9">© mark your picture</text>
  <!-- Stamp lines (watermark symbol) -->
  <line x1="420" y1="336" x2="460" y2="296" stroke="#a78bfa" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="440" y1="356" x2="480" y2="316" stroke="#a78bfa" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="400" y1="316" x2="440" y2="276" stroke="#a78bfa" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
</svg>
