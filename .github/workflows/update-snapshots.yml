name: Update E2E Snapshots

on:
  issue_comment:
    types: [created]

jobs:
  update-snapshots:
    name: Update E2E Snapshots
    runs-on: ubuntu-latest
    # Only run on PR comments by owners/collaborators that contain the trigger command
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/update-snapshots') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Get PR branch
        uses: actions/github-script@v7
        id: pr-info
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('branch', pr.head.ref);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Update visual snapshots
        # Runs `playwright test --update-snapshots` to regenerate all visual baseline PNGs
        run: npm run e2e:update

      - name: Commit and push updated snapshots
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/visual.spec.ts-snapshots
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "test(e2e): update visual snapshots"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Post result comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const changed = '${{ steps.commit.outputs.changed }}' === 'true';
            const body = changed
              ? '✅ Visual snapshots updated and committed to this branch. The E2E tests should now pass.'
              : 'ℹ️ Visual snapshots are already up to date — no changes were needed.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
